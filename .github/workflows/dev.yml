name: Checks

on:
  push:
    branches:
    - dev

  pull_request_target:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install libs
        run: yarn

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn type-check

      - name: Build the app
        run: yarn build

      - name: Deploy to Vercel
        run: npx vercel@latest --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
